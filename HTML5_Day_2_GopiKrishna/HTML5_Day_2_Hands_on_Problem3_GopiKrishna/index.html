<!--HTML5_Day_2_Hands_on_Problem3_GopiKrishna
Requirements
Create an HTML webpage that includes:
Create a form with following input types:
	•	text (Name)
	•	email
	•	tel
	•	number (Age)
	•	date
Use HTML5 built-in validation:
	•	required
	•	min, max
	•	pattern (for phone number)
Add submit button
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
</head>
<body>
    <h2>Student Registration Form</h2>

    <form>
        <label for="name">Full Name:</label><br>
            <input type="text"  id="name"  name="name"  placeholder="Enter your full name"  required>
            <br><br>
        <label for="email">Email Address:</label><br>
            <input  type="email"  id="email"  name="email"  placeholder="example@mail.com"   required>
            <br><br>
        <label for="phone">Mobile Number:</label><br>
            <input  type="tel"  id="phone"  name="phone"  placeholder="10-digit mobile number"  pattern="[0-9]{10}"  required>
            <br><br>
        <label for="age">Age:</label><br>
            <input  type="number"  id="age"  name="age"  min="18"  max="30"  required>
            <br><br>
        <label for="dob">Date of Birth:</label><br>
            <input  type="date"  id="dob"  name="dob"  required >
            <br><br>

        <input type="submit" value="Register">
    </form>

</body>
</html>
