<!--CSS3_Day3_Hands_on_Problem_2_GopiKrishna
Requirements
  Create a profile card layout containing:
	•	Name (heading)
	•	Role/title
	•	Short description paragraph
	•	Contact button
 Apply:
	•	Text formatting (alignment, decoration)
	•	Font styles (font-family, size, weight)
	•	Typography enhancements (line-height, letter-spacing)
Use the CSS Box Model:
	•	Padding for spacing inside the card
	•	Border to define the card boundary
	•	Margin to separate the card from the page edges
Add:
	•	Background color
	•	Border radius
	•	Hover effect on the button
-->    
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="profile-card">
        <h2 class="name">Gopi Krishna</h2>
        <h4 class="role">Software Developer</h4>

        <p class="bio">
            Passionate software developer with expertise in web technologies. Skilled in creating responsive and user-friendly applications. 
            Always eager to learn and innovate in the tech world.
        </p>

        <button class="contact-btn">Contact</button>
    </div>

</body>
</html>
