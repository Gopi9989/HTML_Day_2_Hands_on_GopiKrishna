<!--
Requirements
	•	Fields:
            Name
            Email
            Age
	•	Use:
            onchange
            onclick
Validate:
    Name cannot be empty
    Email must contain "@"
    Age must be greater than 18
	•	Display validation message dynamically.
	•	Store valid user data in sessionStorage.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Form Validation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }
    input {
      display: block;
      margin-bottom: 5px;
      padding: 6px;
      width: 250px;
    }
    p {
      margin-top: 15px;
      font-size: 16px;
      color: green;
    }
    span {
      font-size: 14px;
      color: red;
      margin-bottom: 10px;
      display: block;
    }
    button {
      margin-top: 15px;
      padding: 8px 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>Registration Form</h2>

  <label>Name:</label>
  <input type="text" id="name" onchange="validateName()">
  <span id="nameMsg"></span>

  <label>Email:</label>
  <input type="text" id="email" onchange="validateEmail()">
  <span id="emailMsg"></span>

  <label>Age:</label>
  <input type="number" id="age" onchange="validateAge()">
  <span id="ageMsg"></span>

  <button onclick="saveData()">Register</button>
  <p id="finalMsg"></p>

  <script>
    function validateName() {
      let name = document.getElementById("name").value;
      let msg = document.getElementById("nameMsg");

      if (name === "") {
        msg.textContent = "Name cannot be empty";
        return false;
      } else {
        msg.textContent = "";
        return true;
      }
    }

    function validateEmail() {
      let email = document.getElementById("email").value;
      let msg = document.getElementById("emailMsg");

      if (!email.includes("@")) {
        msg.textContent = "Email must contain '@'";
        return false;
      } else {
        msg.textContent = "";
        return true;
      }
    }
    function validateAge() {
      let age = document.getElementById("age").value;
      let msg = document.getElementById("ageMsg");

      if (age <= 18) {
        msg.textContent = "Age must be greater than 18";
        return false;
      } else {
        msg.textContent = "";
        return true;
      }
    }
    function saveData() {
      if (validateName() && validateEmail() && validateAge()) {
        sessionStorage.setItem("name", document.getElementById("name").value);
        sessionStorage.setItem("email", document.getElementById("email").value);
        sessionStorage.setItem("age", document.getElementById("age").value);

        document.getElementById("finalMsg").textContent =
          "Registration successful! Data stored in sessionStorage.";
      } else {
        document.getElementById("finalMsg").textContent =
          "";
      }
    }
  </script>
</body>
</html>
