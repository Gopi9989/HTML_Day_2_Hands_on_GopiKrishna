<!--
Requirements
	Fields:
	•	Expense Title
	•	Amount
	•	Date
	Buttons:
	•	Add Expense
	•	View Expenses
	•	Delete Expense
	Use:
	•	Client-side database (Web SQL or IndexedDB)
	Execute SQL-like queries:
	•	CREATE TABLE
	•	INSERT
	•	SELECT
	•	DELETE
	Maintain transaction handling.
	Display expense list dynamically.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Expense Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    button {
       row-gap: 100px;
      padding: 8px;
      margin: 5px 0;
    }
    input {
      display: block;
      margin-bottom: 5px;
      padding: 6px;
      width: 250px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #333;
      color: #fff;
    }
    button {
      cursor: pointer;
    }
  </style>
</head>
<body>

    <h2>Mini Expense Tracker (IndexedDB)</h2>

    <label>Expense Title:</label>
    <input type="text" id="title" placeholder="Expense Title"><br>

    <label>Amount:</label>
    <input type="number" id="amount" placeholder="Amount"><br>

    <label>Date:</label>
    <input type="date" id="date"><br>

<button onclick="addExpense()">Add Expense</button>
<button onclick="viewExpenses()">View Expenses</button>

<table>
  <thead>
    <tr>
      <th>Title</th>
      <th>Amount</th>
      <th>Date</th>
      <th>Delete</th>
    </tr>
  </thead>
  <tbody id="expenseList"></tbody>
</table>

<script>
  let db;

  const request = indexedDB.open("ExpenseDB", 1);

  request.onupgradeneeded = function (event) {
    db = event.target.result;

    const store = db.createObjectStore("expenses", {
      keyPath: "id",
      autoIncrement: true
    });

    console.log("Object Store (Table) Created");
  };

  request.onsuccess = function (event) {
    db = event.target.result;
    console.log("Database Connected");
  };

  request.onerror = function () {
    console.error("Database Error");
  };

  function addExpense() {
    const title = document.getElementById("title").value;
    const amount = document.getElementById("amount").value;
    const date = document.getElementById("date").value;

    if (!title || !amount || !date) {
      alert("All fields are required");
      return;
    }

    const transaction = db.transaction("expenses", "readwrite");
    const store = transaction.objectStore("expenses");

    const expense = { title, amount, date };
    const request = store.add(expense);

    request.onsuccess = () => {
      alert("Expense Added");
      viewExpenses();
    };

    request.onerror = () => {
      console.error("Insert Error");
    };

    transaction.onerror = () => {
      console.error("Transaction Failed");
    };
  }

  function viewExpenses() {
    const transaction = db.transaction("expenses", "readonly");
    const store = transaction.objectStore("expenses");
    const request = store.getAll();

    request.onsuccess = function () {
      const list = document.getElementById("expenseList");
      list.innerHTML = "";

      request.result.forEach(exp => {
        list.innerHTML += `
          <tr>
            <td>${exp.title}</td>
            <td>${exp.amount}</td>
            <td>${exp.date}</td>
            <td>
              <button onclick="deleteExpense(${exp.id})">Delete</button>
            </td>
          </tr>
        `;
      });
    };

    request.onerror = () => {
      console.error("Select Query Failed");
    };
  }

  function deleteExpense(id) {
    const transaction = db.transaction("expenses", "readwrite");
    const store = transaction.objectStore("expenses");
    const request = store.delete(id);

    request.onsuccess = () => {
      alert("Expense Deleted");
      viewExpenses();
    };

    request.onerror = () => {
      console.error("Delete Failed");
    };
  }
</script>

</body>
</html>
