<!--JS_Day4_Hands_on_Problem3_GopiKrishna
Requirements
	Store purchase amount in a variable
	Apply discount rules:
	•	Amount ≥ 5000 → 20% discount
	•	Amount ≥ 3000 → 10% discount
	•	Amount < 3000 → No discount
	Calculate and display:
	•	Discount amount
	•	Final payable amount
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Calculator</title>
</head>
<body>
    <h2>Discount Calculator</h2>

    <script>
        let totalamount=4000;
        if (isNaN(totalamount)) {
            document.write("Please enter numbers only");
        } else if(totalamount < 0){
            document.write("invalid amount");
        } else if(totalamount >= 5000){
            let discountamount = totalamount * 0.20;
            let finalamount = totalamount - discountamount;
            document.write("Discount Amount: " + discountamount + "<br>");
            document.write("Final Payable Amount: " + finalamount);
        } else if(totalamount >= 3000){
            let discountamount = totalamount * 0.10;
            let finalamount = totalamount - discountamount;
            document.write("Discount Amount: " + discountamount + "<br>");
            document.write("Final Payable Amount: " + finalamount);
        } else {
            document.write("No discount applied. Final Payable Amount: " + totalamount);
        }
    </script>
</body>
</html>
