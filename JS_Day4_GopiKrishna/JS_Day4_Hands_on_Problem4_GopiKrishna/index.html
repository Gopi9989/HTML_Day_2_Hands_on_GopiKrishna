<!--JS_Day4_Hands_on_Problem4_GopiKrishna
Requirements
	•	Store signal color in a variable ("red", "yellow", "green")
	•	Use a switch statement to display:
	•	Red → Stop
	•	Yellow → Get Ready
	•	Green → Go
Handle invalid signal input gracefully
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Signal Simulator</title>
</head>
<body>
    <h2>Traffic Signal Simulator</h2>
    <script>
        let signalColor = prompt("Enter the color").toLowerCase();
        switch (signalColor) {
            case "red":
                console.log("Stop");
                break;
            case "yellow":
                console.log("Get Ready");
                break;
            case "green":
                console.log("Go");
                break;
            default:
                console.log("Invalid signal color, please enter red, yellow, or green.");
        }
    </script>
</body>
</html>
