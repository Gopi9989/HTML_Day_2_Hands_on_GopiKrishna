<!--
📌 Requirements
	•	Accept the student’s marks as a variable
	•	Use if–else statements to assign grades:
	•	Marks ≥ 75 → Grade A
	•	Marks ≥ 60 → Grade B
	•	Marks ≥ 40 → Grade C
	•	Marks < 40 → Fail
Display the grade on the web page or console
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Calculator</title>
</head>
<body>
    <h2>Student Grade Calculator</h2>
    <script>
        let marks =prompt("Enter the student's marks:");
        if (isNaN(marks)) {
            document.write("Please enter numbers only");
        } else if(marks > 100 || marks < 0){
            document.write("invalid marks");
        } else if(marks <= 100 && marks >= 75){
            document.write("Grade: A");
        } else if(marks >= 60){
            document.write("Grade: B");
        } else if(marks >= 40){
            document.write("Grade: C");
        } else {
            document.write("Grade: Fail");
        }
    </script>
</body>
</html>
