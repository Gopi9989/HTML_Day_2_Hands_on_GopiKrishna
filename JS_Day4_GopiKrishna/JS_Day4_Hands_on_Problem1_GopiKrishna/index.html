<!--
Hands-on Tasks: 
1. Add viewport meta tag to the HTML page 
2. Use media queries to: 
    Change background color on mobile screen 
    Adjust font size for smaller screens 
3. Convert navigation into vertical layout on mobile 
4. Test the page using browser responsive mode 
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Webpage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Responsive Webpage</h1>
  </header>

  <nav>
    <ul>
      <li>Home</li>
      <li>Products</li>
      <li>Contact</li>
    </ul>
  </nav>
  
  <!--Adding dark mode toggle button-->
  <button id="darkModeToggle">Toggle Dark Mode</button>

  <main>
    <p>
      By reducing the size of the browser window from desktop to mobile view, you can see the background color and 
      size of the text changes. 
    </p>
  </main>

</body>
</html>
